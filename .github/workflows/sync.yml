name: Tencent Meeting Sync

on:
  schedule:
    - cron: '*/30 * * * *'  # 每 30 分钟自动执行一次
  workflow_dispatch:          # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install requests

      - name: 拉取腾讯会议日程
        env:
          CALDAV_USER: ${{ secrets.CALDAV_USER }}
          CALDAV_PASS: ${{ secrets.CALDAV_PASS }}
        run: |
          # 根据用户名构建 CalDAV collection URL
          USER_PREFIX=$(echo "$CALDAV_USER" | cut -d'@' -f1)
          export CALDAV_URL="https://cal.meeting.tencent.com/caldav/${USER_PREFIX}/calendar/32NRxvy8nRR3p/"
          python3 sync_caldav.py

      - name: 合并 ics 文件
        run: |
          shopt -s nullglob
          files=(~/.vdirsyncer/calendars/tencent/events/*.ics)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .ics files found, keeping previous all.ics."
            exit 0
          fi
          echo "Merging ${#files[@]} files..."
          python3 merge.py "${files[@]}" > all.ics
          echo "all.ics size: $(wc -l < all.ics) lines"

      - name: 提交更新到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add all.ics
          if git diff --cached --quiet; then
            echo "No changes, skip commit."
          else
            git commit -m "chore: sync meetings $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
